<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA WM 2026 | Deutsche Telekom</title>
<style>
  :root {
    --magenta: #E20074;
    --magenta-dark: #B3005A;
    --magenta-light: #FF1A8C;
    --magenta-subtle: rgba(226,0,116,0.08);
    --bg: #0A0A0A;
    --bg-surface: #111111;
    --bg-card: #181818;
    --bg-card-hover: #1E1E1E;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --text-primary: #F5F5F5;
    --text-secondary: #A0A0A0;
    --text-muted: #5A5A5A;
    --success: #22C55E;
    --error: #EF4444;
    --warning: #F59E0B;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; font-size: 15px; line-height: 1.5; }
  .header { background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .logo img { height: 40px; width: auto; display: block; }
  .header-badge { font-size: 12px; color: var(--magenta); border: 1px solid rgba(226,0,116,0.3); padding: 4px 10px; border-radius: 20px; letter-spacing: 0.04em; font-weight: 500; white-space: nowrap; }
  .nav { background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 24px; }
  .nav-tab { padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; user-select: none; letter-spacing: 0.02em; }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab.active { color: var(--text-primary); border-bottom-color: var(--magenta); }
  .main { max-width: 820px; margin: 0 auto; padding: 40px 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .quiz-hero { text-align: center; padding: 48px 0 40px; }
  .quiz-hero h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 12px; }
  .quiz-hero h1 span { color: var(--magenta); }
  .quiz-hero p { color: var(--text-secondary); font-size: 15px; max-width: 400px; margin: 0 auto 32px; }
  .btn-start { background: var(--magenta); color: white; border: none; padding: 14px 36px; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .btn-start:hover { background: var(--magenta-light); }
  .btn-start:active { transform: scale(0.98); }
  .quiz-progress { margin-bottom: 32px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.03em; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--magenta); border-radius: 2px; transition: width 0.4s ease; }
  .question-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 24px; }
  .question-label { font-size: 11px; color: var(--magenta); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .question-text { font-size: 18px; font-weight: 600; line-height: 1.4; letter-spacing: -0.01em; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  @media (max-width: 560px) { .options { grid-template-columns: 1fr; } }
  .option { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; cursor: pointer; transition: border-color 0.15s, background 0.15s; font-size: 14px; color: var(--text-primary); text-align: left; display: flex; align-items: center; gap: 10px; }
  .option:hover:not(:disabled) { border-color: var(--border-strong); background: var(--bg-card-hover); }
  .option-letter { width: 26px; height: 26px; border-radius: 6px; background: var(--bg-surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .option.correct { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.07); }
  .option.correct .option-letter { background: var(--success); color: white; border-color: var(--success); }
  .option.wrong { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }
  .option.wrong .option-letter { background: var(--error); color: white; border-color: var(--error); }
  .option.reveal-correct { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.04); }
  .option.reveal-correct .option-letter { background: rgba(34,197,94,0.2); color: var(--success); border-color: rgba(34,197,94,0.4); }
  .option:disabled { cursor: default; }
  .feedback { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; display: none; align-items: flex-start; gap: 10px; }
  .feedback.show { display: flex; }
  .feedback.correct-fb { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #86EFAC; }
  .feedback.wrong-fb { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2); color: #FCA5A5; }
  .feedback-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .btn-next { background: transparent; color: var(--text-primary); border: 1px solid var(--border-strong); padding: 12px 28px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, border-color 0.15s; float: right; }
  .btn-next:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.25); }
  .results-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 48px 40px; text-align: center; }
  .score-ring { width: 120px; height: 120px; margin: 0 auto 28px; position: relative; }
  .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-number { font-size: 28px; font-weight: 700; line-height: 1; }
  .score-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 2px; }
  .results-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.01em; }
  .results-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
  .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .result-stat { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .result-stat-num { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .result-stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .btn-retry { background: var(--magenta); color: white; border: none; padding: 13px 32px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-right: 10px; }
  .btn-retry:hover { background: var(--magenta-light); }
  .btn-spielplan { background: transparent; color: var(--text-primary); border: 1px solid var(--border-strong); padding: 13px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-spielplan:hover { background: var(--bg-card-hover); }
  .spielplan-header { margin-bottom: 32px; }
  .spielplan-header h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .spielplan-header p { color: var(--text-secondary); font-size: 14px; }
  .spielplan-controls { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em; }
  .filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .filter-btn.active { background: var(--magenta-subtle); border-color: rgba(226,0,116,0.4); color: var(--magenta-light); }
  .games-list { display: flex; flex-direction: column; gap: 8px; }
  .game-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; transition: border-color 0.15s; }
  .game-card:hover { border-color: var(--border-strong); }
  .team-side { display: flex; align-items: center; gap: 10px; }
  .team-side.right { flex-direction: row-reverse; text-align: right; }
  .team-flag { width: 32px; height: 22px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .team-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .team-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; }
  .game-center { text-align: center; }
  .game-score { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
  .game-score.upcoming { color: var(--text-muted); font-size: 15px; font-weight: 500; }
  .game-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.03em; }
  .game-status-tag { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }
  .tag-finished { color: var(--text-muted); }
  .tag-upcoming { color: var(--warning); }
  .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 20px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .clearfix::after { content:''; display:block; clear:both; }
  @media (max-width: 480px) { .main { padding: 24px 16px; } .results-grid { grid-template-columns: 1fr 1fr; } .game-card { padding: 12px 14px; gap: 10px; } .team-name { font-size: 12px; } }
</style>
</head>

function renderQuestion() {
  answered = false;
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  document.getElementById('q-counter').textContent = `Frage ${currentQ+1} von ${total}`;
  document.getElementById('q-score-live').textContent = `${score} Richtig`;
  document.getElementById('progress-fill').style.width = `${(currentQ/total)*100}%`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[currentQ];
  const options = document.querySelectorAll('.option');
  const isCorrect = idx === q.correct;
  if (isCorrect) score++;
  options.forEach((btn, i) => {
    btn.disabled = true;
    if (i === idx && isCorrect) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
    else if (i === q.correct && !isCorrect) btn.classList.add('reveal-correct');
  });
  const fb = document.getElementById('feedback');
  document.getElementById('fb-icon').textContent = isCorrect ? '✓' : '✗';
  document.getElementById('fb-text').textContent = isCorrect ? `Richtig! ${q.explanation}` : `Leider falsch. ${q.explanation}`;
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  const btn = document.getElementById('btn-next');
  btn.style.display = 'block';
  btn.textContent = currentQ < QUESTIONS.length - 1 ? 'Weiter →' : 'Ergebnis ansehen';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quiz-question').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'block';
  const total = QUESTIONS.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('res-score').textContent = `${score}/${total}`;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = total - score;
  document.getElementById('res-pct').textContent = `${pct}%`;
  setTimeout(() => {
    const arc = document.getElementById('score-arc');
    arc.style.transition = 'stroke-dashoffset 1s ease';
    arc.style.strokeDashoffset = 326.7 - (pct / 100) * 326.7;
  }, 100);
  const titles = [[87,'Weltklasse!','Du bist ein echter WM-Experte.'],[62,'Gut gespielt!','Solides WM-Wissen – fast auf Expertenebene.'],[37,'Ausbaufähig','Du kennst schon einiges – schau dir den Spielplan an!'],[0,'Anfänger','Lern das Turnier im Spielplan kennen und starte neu!']];
  const [,t,s] = titles.find(([min]) => pct >= min);
  document.getElementById('res-title').textContent = t;
  document.getElementById('res-subtitle').textContent = s;
}

function restartQuiz() {
  document.getElementById('quiz-results').style.display = 'none';
  document.getElementById('quiz-start').style.display = 'block';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGames();
}

function renderGames() {
  let games = allGames;
  if (currentFilter === 'upcoming') games = games.filter(g => g.status === 'upcoming');
  else if (currentFilter === 'finished') games = games.filter(g => g.status === 'finished');
  else if (currentFilter === 'de') games = games.filter(g => g.home.startsWith('Deutschland') || g.away.startsWith('Deutschland'));

  const finished = games.filter(g => g.status === 'finished').sort((a,b) => b.date.localeCompare(a.date));
  const upcoming = games.filter(g => g.status === 'upcoming').sort((a,b) => a.date.localeCompare(b.date));

  let html = '';

  if (finished.length) {
    html += `<div class="section-label">Ergebnisse</div><div class="games-list">`;
    finished.forEach(g => { html += gameHTML(g); });
    html += '</div>';
  }

  if (upcoming.length) {
    html += `<div class="section-label">Kommende Spiele</div><div class="games-list">`;
    upcoming.forEach(g => { html += gameHTML(g); });
    html += '</div>';
  }

  if (!html) html = `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:14px;">Keine Spiele gefunden.</div>`;

  document.getElementById('spielplan-content').innerHTML = html;
}

function gameHTML(g) {
  const dateStr = new Date(g.date + 'T12:00:00').toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'short'});
  const isFinished = g.status === 'finished';
  const scoreHTML = isFinished
    ? `<div class="game-score">${g.hs} : ${g.as}</div>`
    : `<div class="game-score upcoming">vs</div>`;
  const statusHTML = isFinished
    ? `<div class="game-status-tag tag-finished">Abgeschlossen</div>`
    : `<div class="game-status-tag tag-upcoming">${dateStr} &middot; ${g.time}</div>`;
  return `<div class="game-card">
    <div class="team-side">
      <div class="team-flag">${g.hf}</div>
      <div><div class="team-name">${g.home}</div><div class="team-sub">${g.group}</div></div>
    </div>
    <div class="game-center">${scoreHTML}${statusHTML}<div class="game-time">${g.venue}</div></div>
    <div class="team-side right">
      <div class="team-flag">${g.af}</div>
      <div><div class="team-name">${g.away}</div><div class="team-sub">${g.round}</div></div>
    </div>
  </div>`;
}

function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'spielplan') renderGames();
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});
</script>
