  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"889e4a85-9558-4988-9ac4-7b328bc19f47\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{background:#0A0A0A;color:#F5F5F5;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}\n  @keyframes floatUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}\n  @keyframes qIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}\n  @keyframes optIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n  @keyframes popIn{0%{transform:scale(.85)}55%{transform:scale(1.05)}100%{transform:scale(1)}}\n  @keyframes fbIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n  @keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}\n  @keyframes scorePulse{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}\n  @keyframes heroGlow{0%,100%{opacity:.45;transform:translate(-50%,-50%) scale(1)}50%{opacity:.75;transform:translate(-50%,-50%) scale(1.08)}}\n  @keyframes ringPop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}\n  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.35}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<header style=\"background:#111;border-bottom:1px solid rgba(255,255,255,.07);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100\">\n  <img src=\"80c6189d-1ff3-4277-a37a-c0e90990d8ea\" alt=\"Deutsche Telekom — FIFA WM 2026\" style=\"height:36px;width:auto;display:block\">\n  <div style=\"font-size:11px;color:#FF1A8C;border:1px solid rgba(226,0,116,.35);padding:5px 12px;border-radius:20px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;white-space:nowrap\">Official Broadcaster<\u002Fdiv>\n<\u002Fheader>\n\n<nav style=\"background:#111;border-bottom:1px solid rgba(255,255,255,.07);display:flex;padding:0 24px;position:sticky;top:64px;z-index:90\">\n  <div onclick=\"{{ goQuiz }}\" style=\"{{ quizTabStyle }}\">Quiz<\u002Fdiv>\n  <div onclick=\"{{ goSpielplan }}\" style=\"{{ spielTabStyle }}\">Spielplan<\u002Fdiv>\n<\u002Fnav>\n\n<main style=\"max-width:840px;margin:0 auto;padding:36px 24px 72px\">\n\n  <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <sc-if value=\"{{ isStart }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:relative;text-align:center;padding:60px 0 36px;animation:floatUp .6s ease both;overflow:hidden\">\n        <div style=\"position:absolute;top:42%;left:50%;width:520px;height:340px;background:radial-gradient(ellipse at center,rgba(226,0,116,.32),transparent 70%);filter:blur(20px);z-index:0;animation:heroGlow 5s ease-in-out infinite\"><\u002Fdiv>\n        <div style=\"position:relative;z-index:1\">\n          <div style=\"display:inline-block;font-size:11px;color:#FF1A8C;border:1px solid rgba(226,0,116,.35);padding:6px 14px;border-radius:20px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:26px\">FIFA WM 2026 · Quiz<\u002Fdiv>\n          <h1 style=\"font-size:clamp(34px,6.5vw,56px);font-weight:800;letter-spacing:-.03em;line-height:1.04;margin-bottom:16px\">Wie gut kennst du<br>die <span style=\"color:#E20074\">WM 2026<\u002Fspan>?<\u002Fh1>\n          <p style=\"color:#A0A0A0;font-size:16px;max-width:420px;margin:0 auto 32px\">Acht Fragen rund um das Turnier in den USA, Kanada und Mexiko. Schaffst du die Bestmarke?<\u002Fp>\n          <button onclick=\"{{ startQuiz }}\" style=\"background:#E20074;color:#fff;border:none;padding:16px 40px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .12s,box-shadow .2s\" style-h     const koLists  = await Promise.all(this.KO_CODES.map(r => grab(r).catch(() => [])));\n      const map = {}; let anyLive = false;\n      grpLists.forEach(events => events.forEach(e => {\n        const hDE = this.apiToDe(e.strHomeTeam); const aDE = this.apiToDe(e.strAwayTeam);\n        if(!hDE || !aDE) return;\n        const c = this.classify(e);\n        if(c.live) anyLive = true;\n        map[this.pairKey(hDE, aDE)] = { hs:c.hs, as:c.as, fin:c.fin, live:c.live };\n      }));\n      const ko = {};\n      koLists.forEach((events, idx) => {\n        const key = this.KO_MAP[String(this.KO_CODES[idx])];\n        if(!key || !events.length) return;\n        const games = events.map(e => this.koGame(e, key)).filter(Boolean);\n        if(games.length){ ko[key] = games; if(games.some(g => g.s === 'live')) anyLive = true; }\n      });\n      this.setState({ live:{ status: anyLive ? 'live' : 'ok', updated: Date.now(), map, ko, error:null } });\n    } catch(e){\n      this.setState({ live: Object.assign({}, this.state.live, { status:'offline', error: String(e && e.message || e) }) });\n    }\n  }\n\n  mergeGame(g){\n    const live = this.state.live;\n    if(!live || !live.map || g.h === 'Noch offen') return g;\n    const u = live.map[this.pairKey(g.h, g.a)];\n    if(!u) return g;\n    const ng = Object.assign({}, g);\n    if(u.fin && typeof u.hs === 'number' && typeof u.as === 'number'){ ng.hs = u.hs; ng.as = u.as; ng.s = 'fin'; }\n    else if(u.live){ ng.hs = typeof u.hs === 'number' ? u.hs : 0; ng.as = typeof u.as === 'number' ? u.as : 0; ng.s = 'live'; }\n    return ng;\n  }\n\n  mergedGames(){ return this.GAMES.map(g => this.mergeGame(g)); }\n\n  selectAnswer(i){\n    if(this.state.answered) return;\n    const q = this.QUESTIONS[this.state.currentQ];\n    const correct = i === q.correct;\n    const answers = Object.assign({}, this.state.answers, { [this.state.currentQ]: i });\n    this.setState({ answered:true, selected:i, score:this.state.score + (correct?1:0), answers });\n  }\n\n  nextQuestion = () => {\n    const n = this.state.currentQ + 1;\n    if(n >= this.QUESTIONS.length) this.setState({ view:'results' });\n    else this.setState({ currentQ:n, answered:false, selected:null });\n  };\n\n  navTabStyle(active){\n    return { padding:'15px 18px', fontSize:'14px', fontWeight:'600', cursor:'pointer', userSelect:'none', letterSpacing:'.01em',\n      color: active ? '#F5F5F5' : '#6A6A6A', borderBottom: active ? '2px solid #E20074' : '2px solid transparent', transition:'color .15s' };\n  }\n\n  chipStyle(active){\n    return { background: active ? 'rgba(226,0,116,.14)' : '#161616', border: active ? '1px solid rgba(226,0,116,.45)' : '1px solid rgba(255,255,255,.08)',\n      color: active ? '#FF4DA0' : '#A0A0A0', padding:'9px 17px', borderRadius:'22px', fontSize:'13px', fontWeight:'600', cursor:'pointer',\n      fontFamily:'inherit', letterSpacing:'.01em', transition:'all .15s', whiteSpace:'nowrap' };\n  }\n\n  fmtShort(d){\n    return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});\n  }\n\n  chip(){\n    return { width:'46px', height:'34px', flexShrink:'0', borderRadius:'8px', background:'#0C0C0C', border:'1px solid rgba(255,255,255,.1)',\n      display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', fontWeight:'800', letterSpacing:'.04em', color:'#D8D8D8',\n      fontFamily:\"'Helvetica Neue',Arial,sans-serif\" };\n  }\n\n  buildSections(){\n    const f = this.state.filter;\n    const koKeys = ['r32','r16','qf','sf','br','final'];\n    const ko = (this.state.live && this.state.live.ko) || {};\n    const merged = this.mergedGames();\n    const rounds = this.ROUNDS.filter(r => {\n      if(f === 'all' || f === 'de') return true;\n      if(f === 'ko') return koKeys.includes(r.key);\n      return String(r.key) === String(f);\n    });\n    const secs = [];\n    rounds.forEach(r => {\n      let gs = (koKeys.includes(r.key) && ko[r.key] && ko[r.key].length) ? ko[r.key] : merged.filter(g => g.r === r.key);\n      if(f === 'de') gs = gs.filter(g => g.h === 'Deutschland' || g.a === 'Deutschland');\n      if(!gs.length) return;\n      const played = gs.filter(g => g.s === 'fin').length;\n      const anyOpen = gs.some(g => g.s !== 'fin');\n      const count = played ? (played + '/' + gs.length + ' gespielt') : (gs.length + ' Spiele');\n      secs.push({ label: r.label, accent: anyOpen ? '#FF4DA0' : '#6A6A6A', count, games: gs.map(g => this.toCard(g)) });\n    });\n    return secs;\n  }\n\n  toCard(g){\n    const isFin = g.s === 'fin';\n    const isToday = g.s === 'today';\n    const isLive = g.s === 'live';\n    const isTBD = g.h === 'Noch offen';\n    const isDe = g.h === 'Deutschland' || g.a === 'Deutschland';\n    const homeWin = isFin && g.hs > g.as;\n    const awayWin = isFin && g.as > g.hs;\n    const draw = isFin && g.hs === g.as;\n    const nameBase = { fontSize:'14px', fontWeight:'700', letterSpacing:'-.01em', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' };\n    const dim = { color:'#6E6E6E' };\n    const tbdName = { color:'#5A5A5A', fontWeight:'600' };\n    const cardStyle = { display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', gap:'10px',\n      background: isDe ? 'linear-gradient(90deg,rgba(226,0,116,.07),#141414 38%)' : '#141414',\n      border: isDe ? '1px solid rgba(226,0,116,.3)' : '1px solid rgba(255,255,255,.07)',\n      borderRadius:'13px', padding:'15px 18px', transition:'border-color .15s', opacity: isTBD ? '.72' : '1' };\n    if(isLive){ cardStyle.border = '1px solid rgba(226,0,116,.55)'; cardStyle.background = 'linear-gradient(90deg,rgba(226,0,116,.12),#141414 45%)'; }\n    const chip = this.chip();\n    const chipTBD = Object.assign({}, this.chip(), { color:'#4A4A4A', background:'#0E0E0E' });\n    return {\n      homeName:g.h, awayName:g.a, homeCode:this.CODES[g.h]||'?', awayCode:this.CODES[g.a]||'?',\n      group:g.grp || '', venue:g.v, cardStyle,\n      homeChip: isTBD ? chipTBD : chip, awayChip: isTBD ? chipTBD : chip,\n      homeNameStyle: Object.assign({}, nameBase, isTBD ? tbdName : (isFin && !homeWin && !draw ? dim : {color:'#F5F5F5'})),\n      awayNameStyle: Object.assign({}, nameBase, isTBD ? tbdName : (isFin && !awayWin && !draw ? dim : {color:'#F5F5F5'})),\n      scoreText: (isFin || isLive) ? (g.hs + ' : ' + g.as) : (isTBD ? '·' : 'vs'),\n      scoreStyle: isLive\n        ? { fontSize:'20px', fontWeight:'800', letterSpacing:'.06em', color:'#FF4DA0' }\n        : isFin\n          ? { fontSize:'20px', fontWeight:'800', letterSpacing:'.06em', color:'#fff' }\n          : { fontSize:'14px', fontWeight:'600', color:'#6A6A6A', letterSpacing:'.04em' },\n      statusText: isLive ? 'LIVE' : (isFin ? this.fmtShort(g.d) : (isToday ? ('HEUTE · ' + g.t) : (this.fmtShort(g.d) + ' · ' + g.t))),\n      statusStyle: (isLive || isToday)\n        ? { fontSize:'10px', color:'#FF4DA0', letterSpacing:'.05em', marginTop:'4px', fontWeight:'700', animation:'livePulse 1.5s ease-in-out infinite' }\n        : isFin\n          ? { fontSize:'10px', color:'#5A5A5A', letterSpacing:'.04em', marginTop:'4px', textTransform:'uppercase' }\n          : { fontSize:'10px', color:'#8A8A8A', letterSpacing:'.02em', marginTop:'4px' }\n    };\n  }\n\n  renderVals(){\n    const s = this.state;\n    const isQuiz = s.tab === 'quiz';\n    const out = {\n      isQuiz, isSpielplan: s.tab === 'spielplan',\n      quizTabStyle: this.navTabStyle(isQuiz),\n      spielTabStyle: this.navTabStyle(s.tab === 'spielplan'),\n      goQuiz: this.goQuiz, goSpielplan: this.goSpielplan,\n      startQuiz: this.startQuiz, restartQuiz: this.restartQuiz, nextQuestion: this.nextQuestion,\n      isStart: s.view === 'start', isQuestion: s.view === 'question', isResults: s.view === 'results'\n    };\n\n    // ---- Question ----\n    const q = this.QUESTIONS[s.currentQ];\n    const total = this.QUESTIONS.length;\n    out.qKey = 'q' + s.currentQ;\n    out.qCounter = 'Frage ' + (s.currentQ + 1) + ' von ' + total;\n    out.scoreLive = s.score + (s.score === 1 ? ' Richtig' : ' Richtig');\n    out.qCategory = q.category;\n    out.qText = q.text;\n    out.answered = s.answered;\n\n    const baseOpt = { display:'flex', alignItems:'center', gap:'12px', background:'#181818', border:'1px solid rgba(255,255,255,.09)',\n      borderRadius:'13px', padding:'16px 18px', cursor:'pointer', fontSize:'15px', color:'#F5F5F5', textAlign:'left',\n      fontFamily:'inherit', width:'100%', transition:'border-color .15s,background .15s,transform .12s,box-shadow .2s', animation:'optIn .4s ease both' };\n    const baseLetter = { width:'28px', height:'28px', borderRadius:'8px', background:'#0A0A0A', border:'1px solid rgba(255,255,255,.1)',\n      display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', fontWeight:'800', color:'#6A6A6A', flexShrink:'0', transition:'all .15s' };\n\n    out.options = q.options.map((text, i) => {\n      const style = Object.assign({}, baseOpt, { animationDelay: (i * 0.06) + 's' });\n      const letterStyle = Object.assign({}, baseLetter);\n      let mark = '', markStyle = { display:'none' };\n      if(s.answered){\n        style.cursor = 'default';\n        const isSel = s.selected === i;\n        const isCorr = i === q.correct;\n        if(isSel && isCorr){\n          style.border = '1px solid rgba(34,197,94,.6)'; style.background = 'rgba(34,197,94,.1)'; style.animation = 'popIn .4s ease both';\n          letterStyle.background = '#22C55E'; letterStyle.color = '#fff'; letterStyle.border = '1px solid #22C55E';\n          mark = '✓'; markStyle = { color:'#22C55E', fontWeight:'800', fontSize:'16px' };\n        } else if(isSel && !isCorr){\n          style.border = '1px solid rgba(239,68,68,.5)'; style.background = 'rgba(239,68,68,.09)'; style.animation = 'shake .4s ease both';\n          letterStyle.background = '#EF4444'; letterStyle.color = '#fff'; letterStyle.border = '1px solid #EF4444';\n          mark = '✗'; markStyle = { color:'#EF4444', fontWeight:'800', fontSize:'16px' };\n        } else if(isCorr){\n          style.border = '1px solid rgba(34,197,94,.35)'; style.background = 'rgba(34,197,94,.05)';\n          letterStyle.background = 'rgba(34,197,94,.2)'; letterStyle.color = '#22C55E'; letterStyle.border = '1px solid rgba(34,197,94,.4)';\n          mark = '✓'; markStyle = { color:'rgba(34,197,94,.7)', fontWeight:'800', fontSize:'15px' };\n        } else {\n          style.opacity = '.42';\n        }\n      }\n      return { letter: this.LETTERS[i], text, mark, markStyle, style, letterStyle, disabled: s.answered, onClick: () => this.selectAnswer(i) };\n    });\n\n    out.dots = this.QUESTIONS.map((qq, idx) => {\n      let bg = 'rgba(255,255,255,.1)', sh = 'none', grow = '1';\n      if(idx in s.answers){ bg = s.answers[idx] === qq.correct ? '#22C55E' : '#EF4444'; }\n      else if(idx === s.currentQ && s.view === 'question'){ bg = '#E20074'; sh = '0 0 10px rgba(226,0,116,.7)'; }\n      return { style: { flex:grow, height:'4px', borderRadius:'3px', background:bg, boxShadow:sh, transition:'background .3s,box-shadow .3s' } };\n    });\n\n    const isCorrect = s.answered && s.selected === q.correct;\n    out.feedbackIcon = isCorrect ? '✓' : '✗';\n    out.feedbackText = s.answered ? ((isCorrect ? 'Richtig! ' : 'Leider falsch. ') + q.explanation) : '';\n    out.feedbackStyle = { display:'flex', alignItems:'flex-start', gap:'11px', padding:'14px 16px', borderRadius:'12px', fontSize:'13.5px',\n      lineHeight:'1.5', animation:'fbIn .35s ease both',\n      background: isCorrect ? 'rgba(34,197,94,.08)' : 'rgba(239,68,68,.07)',\n      border: isCorrect ? '1px solid rgba(34,197,94,.25)' : '1px solid rgba(239,68,68,.25)',\n      color: isCorrect ? '#86EFAC' : '#FCA5A5' };\n    out.nextLabel = s.currentQ < total - 1 ? 'Weiter  →' : 'Ergebnis ansehen  →';\n\n    // ---- Results ----\n    const pct = Math.round((s.score / total) * 100);\n    out.resScore = s.score + '/' + total;\n    out.resCorrect = s.score;\n    out.resWrong = total - s.score;\n    out.resPct = pct + '%';\n    out.arcOffset = 326.7 - (pct / 100) * 326.7;\n    const tiers = [[87,'Weltklasse!','Du bist ein echter WM-Experte – Glückwunsch!'],[62,'Stark gespielt!','Solides WM-Wissen, fast auf Expertenebene.'],[37,'Ausbaufähig','Du kennst schon einiges – ein Blick in den Spielplan hilft.'],[0,'Aufwärmrunde','Schau dir den Spielplan an und starte einen neuen Versuch!']];\n    const tier = tiers.find(t => pct >= t[0]);\n    out.resTitle = tier[1];\n    out.resSubtitle = tier[2];\n\n    // ---- Spielplan ----\n    out.filters = [\n      { key:'all', label:'Alle' }, { key:1, label:'1. Spieltag' }, { key:2, label:'2. Spieltag' },\n      { key:3, label:'3. Spieltag' }, { key:'ko', label:'K.-o.-Runde' }, { key:'de', label:'Deutschland' }\n    ].map(ff => ({ label: ff.label, style: this.chipStyle(String(s.filter) === String(ff.key)), onClick: () => this.setFilter(ff.key) }));\n    const merged = this.mergedGames();\n    const koKeys = ['r32','r16','qf','sf','br','final'];\n    const ko = (s.live && s.live.ko) || {};\n    let played = 0, liveCount = 0;\n    merged.forEach(g => { if(koKeys.includes(g.r)) return; if(g.s === 'fin') played++; if(g.s === 'live') liveCount++; });\n    koKeys.forEach(k => {\n      const arr = (ko[k] && ko[k].length) ? ko[k] : merged.filter(g => g.r === k);\n      arr.forEach(g => { if(g.s === 'fin') played++; if(g.s === 'live') liveCount++; });\n    });\n    const playedCount = played;\n    out.spielMeta = playedCount + ' von ' + this.GAMES.length + ' Spielen gespielt';\n    const lv = s.live || {};\n    const upd = lv.updated ? new Date(lv.updated).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : null;\n    let bDot='#5A5A5A', bText='Verbinde …', bColor='#7A7A7A', bBorder='rgba(255,255,255,.07)', bBg='#141414', pulse=false;\n    if(lv.status === 'live'){ bDot='#FF1A8C'; bColor='#FF4DA0'; bBorder='rgba(226,0,116,.35)'; bBg='rgba(226,0,116,.10)'; bText = liveCount + ' LIVE · Stand ' + upd; pulse=true; }\n    else if(lv.status === 'ok'){ bDot='#22C55E'; bColor='#9CA3AF'; bText = 'Live-Daten · Stand ' + upd; }\n    else if(lv.status === 'loading'){ bDot='#E0A000'; bColor='#9CA3AF'; bText = 'Aktualisiere …'; pulse=true; }\n    else if(lv.status === 'offline'){ bDot='#E0A000'; bColor='#C9A227'; bBorder='rgba(224,160,0,.3)'; bBg='rgba(224,160,0,.07)'; bText = 'Offline · gespeicherter Stand'; }\n    else if(lv.status === 'nokey'){ bDot='#6A6A6A'; bText = 'Kein API-Schlüssel · gespeicherter Stand'; }\n    out.liveBadgeStyle = { display:'inline-flex', alignItems:'center', gap:'8px', fontSize:'12px', fontWeight:'600', color:bColor, background:bBg, border:'1px solid '+bBorder, padding:'7px 13px', borderRadius:'20px', whiteSpace:'nowrap' };\n    out.liveDotStyle = { width:'7px', height:'7px', borderRadius:'50%', background:bDot, display:'inline-block', flexShrink:'0', animation: pulse ? 'livePulse 1.5s ease-in-out infinite' : 'none' };\n    out.liveBadgeText = bText;\n    out.liveLoading = lv.status === 'loading';\n    out.refreshLive = this.refreshLive;\n    out.refreshLabel = lv.status === 'loading' ? '↻ …' : '↻ Aktualisieren';\n    out.refreshBtnStyle = { background:'transparent', color:'#A0A0A0', border:'1px solid rgba(255,255,255,.14)', padding:'7px 14px', borderRadius:'20px', fontSize:'12px', fontWeight:'600', cursor: lv.status==='loading'?'default':'pointer', fontFamily:'inherit', opacity: lv.status==='loading'?'.55':'1', transition:'background .15s' };\n    const secs = this.buildSections();\n    out.spielSections = secs;\n    out.hasGames = secs.length > 0;\n    out.noGames = secs.length === 0;\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
